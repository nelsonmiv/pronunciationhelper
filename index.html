<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-900">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pronunciation AI Coach - Tutor de Voz Gemini</title>
  
  <!-- Tailwind CSS para el diseño visual -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React 18 y ReactDOM para la reactividad de la aplicación -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel para compilar JSX en vivo en el navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts para tipografías premium -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <script>
    // Configuración personalizada de Tailwind CSS
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          }
        }
      }
    }
  </script>

  <style>
    /* Estilos personalizados para la barra de desplazamiento y transiciones */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0f172a;
    }
    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
    /* Animación de pulsación para el indicador de grabación */
    @keyframes custom-ping {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    .record-pulse {
      animation: custom-ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
    }
  </style>
</head>
<body class="h-full text-slate-100 flex flex-col font-sans">

  <!-- Elemento raíz donde React montará la app -->
  <div id="root" class="min-h-screen flex flex-col"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // --- ICONOS SVG AUTOCONTENIDOS (Evitan fallos de carga por CDN) ---
    const Mic = ({ size = 18, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
    );

    const Square = ({ size = 18, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/></svg>
    );

    const Volume2 = ({ size = 18, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    );

    const Sparkles = ({ size = 18, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="m5 3 1 2.5L8.5 6 6 7 5 9.5 4 7 1.5 6 4 5.5z"/><path d="m19 17 1 2.5 2.5.5-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1z"/></svg>
    );

    const BookOpen = ({ size = 18, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    );

    const ChevronLeft = ({ size = 18, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="15 18 9 12 15 6"/></svg>
    );

    const ChevronRight = ({ size = 18, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="9 18 15 12 9 6"/></svg>
    );

    const Key = ({ size = 18, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 1.5 1.5M15.5 7.5 14 6"/></svg>
    );

    const CheckCircle = ({ size = 18, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    );

    const AlertCircle = ({ size = 18, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
    );

    const Loader2 = ({ size = 18, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin" {...props}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    );

    const MessageSquare = ({ size = 18, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    );

    const FileText = ({ size = 18, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>
    );

    // --- COMPONENTE PRINCIPAL ---
    function App() {
      // --- STREAMING_CHUNK: Inicializando estados del sistema... ---
      const [apiKey, setApiKey] = useState(() => {
        return localStorage.getItem('gemini_speech_api_key') || '';
      });
      const [showApiKeyInput, setShowApiKeyInput] = useState(!apiKey);
      const [selectedVoice, setSelectedVoice] = useState('Kore'); 
      
      const [inputText, setInputText] = useState(
        "¡Hola! Este es un ejemplo de texto para practicar mi pronunciación. Espero que mi profesor virtual de Gemini me ayude a mejorar mi entonación paso a paso."
      );
      const [sentences, setSentences] = useState([]);
      const [currentSentenceIndex, setCurrentSentenceIndex] = useState(0);
      const [activeTab, setActiveTab] = useState('sentences'); // 'sentences' o 'paragraph'
      
      const [isRecording, setIsRecording] = useState(false);
      const [audioUrl, setAudioUrl] = useState(null);
      const [audioBlob, setAudioBlob] = useState(null);
      const [recordingSeconds, setRecordingSeconds] = useState(0);
      
      const [isLoadingFeedback, setIsLoadingFeedback] = useState(false);
      const [isLoadingTTS, setIsLoadingTTS] = useState(false);
      const [feedback, setFeedback] = useState('');
      const [ttsAudioUrl, setTtsAudioUrl] = useState(null);
      const [notification, setNotification] = useState(null);
      
      const mediaRecorderRef = useRef(null);
      const audioChunksRef = useRef([]);
      const timerRef = useRef(null);
      const ttsAudioElementRef = useRef(null);

      // Dividir texto en oraciones al cambiar el texto de entrada
      useEffect(() => {
        const splitSentences = inputText
          .split(/(?<=[.!?])\s+/)
          .map(s => s.trim())
          .filter(s => s.length > 0);
        
        setSentences(splitSentences.length > 0 ? splitSentences : [inputText]);
        setCurrentSentenceIndex(0);
        setFeedback('');
        setTtsAudioUrl(null);
      }, [inputText]);

      // Guardar y borrar API Key
      const handleSaveApiKey = (key) => {
        const trimmed = key.trim();
        setApiKey(trimmed);
        localStorage.setItem('gemini_speech_api_key', trimmed);
        setShowApiKeyInput(false);
        showToast('¡API Key guardada correctamente!', 'success');
      };

      const handleClearApiKey = () => {
        setApiKey('');
        localStorage.removeItem('gemini_speech_api_key');
        setShowApiKeyInput(true);
        showToast('API Key eliminada.', 'info');
      };

      const showToast = (message, type = 'info') => {
        setNotification({ message, type });
        setTimeout(() => {
          setNotification(null);
        }, 4000);
      };

      const getCurrentTextToPractice = () => {
        if (activeTab === 'sentences') {
          return sentences[currentSentenceIndex] || '';
        }
        return inputText;
      };

      // --- STREAMING_CHUNK: Configurando grabadora de audio nativa... ---
      const startRecording = async () => {
        audioChunksRef.current = [];
        setAudioUrl(null);
        setAudioBlob(null);
        setFeedback('');

        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const options = { mimeType: 'audio/webm' };
          
          let recorder;
          try {
            recorder = new MediaRecorder(stream, options);
          } catch (e) {
            recorder = new MediaRecorder(stream);
          }
          
          mediaRecorderRef.current = recorder;
          
          recorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) {
              audioChunksRef.current.push(event.data);
            }
          };

          recorder.onstop = () => {
            const blob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
            setAudioBlob(blob);
            setAudioUrl(URL.createObjectURL(blob));
            stream.getTracks().forEach(track => track.stop());
          };

          recorder.start();
          setIsRecording(true);
          setRecordingSeconds(0);
          
          timerRef.current = setInterval(() => {
            setRecordingSeconds(prev => prev + 1);
          }, 1000);

        } catch (err) {
          console.error("Error al acceder al micrófono:", err);
          showToast("No se pudo acceder al micrófono. Permite los accesos en tu navegador.", "error");
        }
      };

      const stopRecording = () => {
        if (mediaRecorderRef.current && isRecording) {
          mediaRecorderRef.current.stop();
          setIsRecording(false);
          clearInterval(timerRef.current);
        }
      };

      const formatTime = (secs) => {
        const m = Math.floor(secs / 60).toString().padStart(2, '0');
        const s = (secs % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
      };

      const blobToBase64 = (blob) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onloadend = () => {
            const base64String = reader.result.split(',')[1];
            resolve(base64String);
          };
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
      };

      const pcmToWav = (pcmBase64, sampleRate = 24000) => {
        const binaryString = atob(pcmBase64);
        const len = binaryString.length;
        const buffer = new ArrayBuffer(len);
        const view = new Uint8Array(buffer);
        for (let i = 0; i < len; i++) {
          view[i] = binaryString.charCodeAt(i);
        }

        const wavHeader = new ArrayBuffer(44);
        const wavView = new DataView(wavHeader);
        wavView.setUint32(0, 0x52494646, false);
        wavView.setUint32(4, 36 + len, true);
        wavView.setUint32(8, 0x57415645, false);
        wavView.setUint32(12, 0x666d7420, false);
        wavView.setUint32(16, 16, true);
        wavView.setUint16(20, 1, true);
        wavView.setUint16(22, 1, true);
        wavView.setUint32(24, sampleRate, true);
        wavView.setUint32(28, sampleRate * 1 * 2, true);
        wavView.setUint16(32, 1 * 2, true);
        wavView.setUint16(34, 16, true);
        wavView.setUint32(36, 0x64617461, false);
        wavView.setUint32(40, len, true);

        const blob = new Blob([wavHeader, buffer], { type: 'audio/wav' });
        return URL.createObjectURL(blob);
      };

      // --- STREAMING_CHUNK: Integrando llamadas API a Gemini... ---
      const evaluatePronunciation = async () => {
        if (!apiKey) {
          showToast("Por favor, introduce tu API Key de Gemini.", "error");
          setShowApiKeyInput(true);
          return;
        }
        if (!audioBlob) {
          showToast("Primero graba tu pronunciación leyendo el texto.", "error");
          return;
        }

        setIsLoadingFeedback(true);
        setFeedback('');

        const maxRetries = 4;
        let delay = 1000;

        for (let attempt = 1; attempt <= maxRetries; attempt++) {
          try {
            const base64Audio = await blobToBase64(audioBlob);
            const textToPractice = getCurrentTextToPractice();

            const prompt = `Actúa como un profesor de idiomas experto en fonética, sumamente empático, paciente y alentador.
            El estudiante debía leer el siguiente texto exacto: "${textToPractice}".
            
            Analiza el audio de voz adjunto del estudiante y compáralo minuciosamente con el texto esperado. 
            Luego, genera una respuesta clara y estructurada en formato Markdown (en español):
            
            ### 📊 Evaluación de Pronunciación
            - **Porcentaje de precisión estimado:** [Escribe un porcentaje de 0% a 100%]
            - **Fluidez y Ritmo:** [Breve reseña sobre si sonó natural o si hubo demasiadas pausas]
            
            ### 🎯 Fortalezas
            - [Qué palabras o sonidos dominó a la perfección]
            
            ### 👨‍🏫 Palabras a Practicar & Consejos
            - [Haz una lista de palabras específicas que no se pronunciaron del todo bien o donde la entonación falló]
            - [Explica de forma sencilla cómo posicionar la lengua, acentuar la palabra o mejorar el sonido en español]
            
            ### 🎶 Entonación y Pausas
            - [Comentarios sobre si respetó los signos de puntuación, comas, o tonos de pregunta/exclamación]`;

            // Usamos el modelo estable disponible en 2026
            const response = await fetch(
              `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{
                    parts: [
                      { text: prompt },
                      {
                        inlineData: {
                          mimeType: "audio/webm",
                          data: base64Audio
                        }
                      }
                    ]
                  }]
                })
              }
            );

            if (!response.ok) {
              throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();
            const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
            
            if (responseText) {
              setFeedback(responseText);
              showToast("¡Evaluación completada con éxito!", "success");
              break;
            } else {
              throw new Error("No se recibió respuesta legible del modelo.");
            }

          } catch (err) {
            console.error(`Intento ${attempt} fallido:`, err);
            if (attempt === maxRetries) {
              setFeedback(`❌ No se pudo analizar el audio. Verifica tu API Key o intenta con un audio más corto.`);
              showToast("Error de conexión con la API de Gemini.", "error");
            } else {
              await new Promise(res => setTimeout(res, delay));
              delay *= 2;
            }
          }
        }
        setIsLoadingFeedback(false);
      };

      const playNativeVoice = async () => {
        if (!apiKey) {
          showToast("Introduce tu API Key de Gemini para activar las voces realistas.", "error");
          setShowApiKeyInput(true);
          return;
        }

        setIsLoadingTTS(true);
        setTtsAudioUrl(null);

        const maxRetries = 4;
        let delay = 1000;

        for (let attempt = 1; attempt <= maxRetries; attempt++) {
          try {
            const textToPractice = getCurrentTextToPractice();
            
            const response = await fetch(
              `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{
                    parts: [{ text: `Lee el siguiente texto de forma sumamente clara, con tono de docente amable, ritmo natural y entonación perfecta: ${textToPractice}` }]
                  }],
                  generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                      voiceConfig: {
                        prebuiltVoiceConfig: {
                          voiceName: selectedVoice
                        }
                      }
                    }
                  },
                  model: "gemini-2.5-flash-preview-tts"
                }
              }
            );

            if (!response.ok) {
              throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();
            const base64Pcm = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
            const mimeType = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.mimeType || 'audio/L16;rate=24000';

            if (base64Pcm) {
              let sampleRate = 24000;
              const rateMatch = mimeType.match(/rate=(\d+)/);
              if (rateMatch && rateMatch[1]) {
                sampleRate = parseInt(rateMatch[1], 10);
              }

              const wavUrl = pcmToWav(base64Pcm, sampleRate);
              setTtsAudioUrl(wavUrl);
              
              setTimeout(() => {
                if (ttsAudioElementRef.current) {
                  ttsAudioElementRef.current.play();
                }
              }, 100);
              
              showToast(`Escuchando con la voz de ${selectedVoice}`, "success");
              break;
            } else {
              throw new Error("No se recibieron datos de audio.");
            }

          } catch (err) {
            console.error(`Intento de TTS ${attempt} fallido:`, err);
            if (attempt === maxRetries) {
              showToast("Voz realista no disponible en este momento. Inténtalo de nuevo.", "error");
            } else {
              await new Promise(res => setTimeout(res, delay));
              delay *= 2;
            }
          }
        }
        setIsLoadingTTS(false);
      };

      const nextSentence = () => {
        if (currentSentenceIndex < sentences.length - 1) {
          setCurrentSentenceIndex(prev => prev + 1);
          resetPracticeState();
        }
      };

      const prevSentence = () => {
        if (currentSentenceIndex > 0) {
          setCurrentSentenceIndex(prev => prev - 1);
          resetPracticeState();
        }
      };

      const resetPracticeState = () => {
        setAudioUrl(null);
        setAudioBlob(null);
        setFeedback('');
        setTtsAudioUrl(null);
      };

      // --- STREAMING_CHUNK: Renderizando la interfaz gráfica de usuario... ---
      return (
        <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col font-sans">
          
          {/* Toast de Notificaciones */}
          {notification && (
            <div className={`fixed top-4 right-4 z-50 flex items-center gap-2 px-4 py-3 rounded-xl shadow-2xl transition-all duration-300 border ${
              notification.type === 'success' ? 'bg-emerald-950/90 text-emerald-300 border-emerald-500/50' :
              notification.type === 'error' ? 'bg-rose-950/90 text-rose-300 border-rose-500/50' :
              'bg-indigo-950/90 text-indigo-300 border-indigo-500/50'
            }`}>
              {notification.type === 'success' && <CheckCircle size={18} className="text-emerald-400" />}
              {notification.type === 'error' && <AlertCircle size={18} className="text-rose-400" />}
              {notification.type === 'info' && <Sparkles size={18} className="text-indigo-400" />}
              <span className="text-sm font-medium">{notification.message}</span>
            </div>
          )}

          {/* Header */}
          <header className="border-b border-slate-800 bg-slate-950/80 backdrop-blur-md sticky top-0 z-40 px-6 py-4">
            <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="p-2.5 bg-gradient-to-tr from-indigo-600 to-violet-500 rounded-2xl shadow-lg shadow-indigo-500/20">
                  <Sparkles className="h-6 w-6 text-white" />
                </div>
                <div>
                  <h1 className="text-xl font-bold bg-gradient-to-r from-indigo-300 via-violet-200 to-white bg-clip-text text-transparent">
                    Pronunciation AI Coach
                  </h1>
                  <p className="text-xs text-slate-400">Entrenamiento de voz y entonación con la tecnología de Gemini</p>
                </div>
              </div>

              <div className="flex items-center gap-3">
                <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-semibold ${
                  apiKey ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-amber-500/10 text-amber-400 border border-amber-500/20'
                }`}>
                  <span className={`h-2.5 w-2.5 rounded-full ${apiKey ? 'bg-emerald-400 animate-pulse' : 'bg-amber-400'}`} />
                  {apiKey ? 'API Conectada' : 'Falta configurar API Key'}
                </div>

                <button 
                  onClick={() => setShowApiKeyInput(!showApiKeyInput)}
                  className="flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 text-sm font-medium rounded-xl border border-slate-700 transition-all"
                >
                  <Key size={16} />
                  <span>{apiKey ? 'Cambiar API Key' : 'Configurar API Key'}</span>
                </button>
              </div>
            </div>
          </header>

          {/* Main Content Area */}
          <main className="flex-1 max-w-7xl w-full mx-auto px-4 md:px-6 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            {/* Left Column: API settings, Custom Text, configuration */}
            <div className="lg:col-span-4 flex flex-col gap-6">
              
              {/* API Key Form */}
              {showApiKeyInput && (
                <div className="bg-slate-950 p-6 rounded-3xl border border-indigo-500/30 shadow-2xl shadow-indigo-500/5 relative overflow-hidden">
                  <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-500/10 rounded-full blur-2xl" />
                  <div className="relative animate-fadeIn">
                    <div className="flex items-center gap-2 text-indigo-400 mb-2">
                      <Key size={20} className="animate-bounce" />
                      <h3 className="font-bold text-lg">Activar Profesor de Voz</h3>
                    </div>
                    <p className="text-xs text-slate-400 mb-4 leading-relaxed">
                      Para que la app funcione como tutor y escuches su voz realista, ingresa tu API Key de Gemini. Tu clave se procesa localmente en tu navegador y no se envía a servidores externos.
                    </p>
                    <div className="space-y-3">
                      <input 
                        type="password" 
                        placeholder="AIzaSy..." 
                        className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-all"
                        id="api-key-field"
                        defaultValue={apiKey}
                      />
                      <div className="flex gap-2">
                        <button 
                          onClick={() => {
                            const el = document.getElementById('api-key-field');
                            if (el) handleSaveApiKey(el.value);
                          }}
                          className="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2 px-4 rounded-xl text-sm transition-all shadow-lg"
                        >
                          Guardar Clave
                        </button>
                        {apiKey && (
                          <button 
                            onClick={handleClearApiKey}
                            className="bg-rose-950/50 hover:bg-rose-900/50 text-rose-300 border border-rose-900/50 font-medium py-2 px-3 rounded-xl text-sm transition-all"
                          >
                            Eliminar
                          </button>
                        )}
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* Voice Selector and Tutor Settings */}
              <div className="bg-slate-950 p-5 rounded-2xl border border-slate-800">
                <h3 className="text-sm font-semibold text-slate-300 mb-3 flex items-center gap-2">
                  <Volume2 size={16} className="text-indigo-400" />
                  Configurar Profesor Virtual
                </h3>
                <div className="space-y-4">
                  <div>
                    <label className="block text-xs text-slate-400 mb-1.5 font-medium">Voz de Gemini Realista</label>
                    <select 
                      value={selectedVoice} 
                      onChange={(e) => {
                        setSelectedVoice(e.target.value);
                        setTtsAudioUrl(null);
                      }}
                      className="w-full bg-slate-900 border border-slate-800 rounded-xl px-3.5 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-indigo-500 transition-all cursor-pointer"
                    >
                      <option value="Kore">Kore (Femenino - Cálido)</option>
                      <option value="Aoede">Aoede (Femenino - Claro)</option>
                      <option value="Leda">Leda (Femenino - Formal)</option>
                      <option value="Fenrir">Fenrir (Masculino - Profundo)</option>
                      <option value="Puck">Puck (Masculino - Enérgico)</option>
                      <option value="Charon">Charon (Masculino - Relajado)</option>
                    </select>
                  </div>
                </div>
              </div>

              {/* Text Input Block */}
              <div className="bg-slate-950 p-5 rounded-2xl border border-slate-800 flex-1 flex flex-col min-h-[300px]">
                <h3 className="text-sm font-semibold text-slate-300 mb-3 flex items-center gap-2">
                  <FileText size={16} className="text-indigo-400" />
                  Texto para Practicar
                </h3>
                <p className="text-xs text-slate-400 mb-3 leading-relaxed">
                  Pega cualquier fragmento literario, conversación o frase que desees que tu estudiante pronuncie.
                </p>
                <textarea
                  className="flex-1 w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-all resize-none leading-relaxed"
                  placeholder="Escribe el texto aquí para que el tutor virtual lo procese..."
                  value={inputText}
                  onChange={(e) => setInputText(e.target.value)}
                />
              </div>

            </div>

            {}
            {/* Right Column: Active Training Lab */}
            <div className="lg:col-span-8 flex flex-col gap-6">
              
              {/* Practice Mode Selector Tabs */}
              <div className="flex bg-slate-950 p-1.5 rounded-2xl border border-slate-800">
                <button
                  onClick={() => {
                    setActiveTab('sentences');
                    resetPracticeState();
                  }}
                  className={`flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-xl text-sm font-medium transition-all ${
                    activeTab === 'sentences' 
                      ? 'bg-indigo-600 text-white shadow-lg' 
                      : 'text-slate-400 hover:text-slate-200'
                  }`}
                >
                  <BookOpen size={16} />
                  <span>Práctica por Oraciones</span>
                </button>
                <button
                  onClick={() => {
                    setActiveTab('paragraph');
                    resetPracticeState();
                  }}
                  className={`flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-xl text-sm font-medium transition-all ${
                    activeTab === 'paragraph' 
                      ? 'bg-indigo-600 text-white shadow-lg' 
                      : 'text-slate-400 hover:text-slate-200'
                  }`}
                >
                  <FileText size={16} />
                  <span>Lectura Completa (Párrafo)</span>
                </button>
              </div>

              {/* Practice Board Card */}
              <div className="bg-slate-950 p-6 md:p-8 rounded-3xl border border-slate-800 relative overflow-hidden flex flex-col gap-6">
                
                {/* Sentence-specific Navigation and Status Header */}
                {activeTab === 'sentences' && (
                  <div className="flex items-center justify-between border-b border-slate-800/80 pb-4">
                    <div className="flex items-center gap-1.5">
                      <span className="text-xs font-bold text-indigo-400 bg-indigo-400/10 px-2.5 py-1 rounded-full">
                        Oración {currentSentenceIndex + 1} de {sentences.length}
                      </span>
                    </div>
                    <div className="flex items-center gap-2">
                      <button 
                        onClick={prevSentence}
                        disabled={currentSentenceIndex === 0}
                        className="p-1.5 hover:bg-slate-800 disabled:opacity-30 disabled:hover:bg-transparent rounded-lg text-slate-400 transition"
                      >
                        <ChevronLeft size={18} />
                      </button>
                      <button 
                        onClick={nextSentence}
                        disabled={currentSentenceIndex === sentences.length - 1}
                        className="p-1.5 hover:bg-slate-800 disabled:opacity-30 disabled:hover:bg-transparent rounded-lg text-slate-400 transition"
                      >
                        <ChevronRight size={18} />
                      </button>
                    </div>
                  </div>
                )}

                {/* Large Active Reading Area */}
                <div className="relative py-4 min-h-[120px] flex items-center justify-center">
                  <p className="text-xl md:text-2xl font-medium text-center text-slate-100 leading-relaxed max-w-2xl font-serif">
                    "{getCurrentTextToPractice()}"
                  </p>
                </div>

                {/* Listening & Recording Controls Row */}
                <div className="flex flex-col sm:flex-row items-center justify-center gap-4 border-t border-slate-800/80 pt-6">
                  
                  {/* Gemini Native TTS (Listen Correct Pronunciation) */}
                  <button
                    onClick={playNativeVoice}
                    disabled={isLoadingTTS || !apiKey}
                    className={`flex items-center gap-2 px-5 py-3 rounded-xl text-sm font-medium transition-all ${
                      ttsAudioUrl 
                        ? 'bg-emerald-950/30 text-emerald-300 border border-emerald-500/30 hover:bg-emerald-900/30' 
                        : 'bg-indigo-950/40 hover:bg-indigo-900/30 text-indigo-300 border border-indigo-500/20'
                    } disabled:opacity-40 disabled:cursor-not-allowed`}
                  >
                    {isLoadingTTS ? (
                      <Loader2 size={16} className="animate-spin" />
                    ) : (
                      <Volume2 size={16} />
                    )}
                    <span>Escuchar Profesor</span>
                  </button>

                  {/* Central Mic Button */}
                  <div className="flex items-center gap-2 relative">
                    {!isRecording ? (
                      <button
                        onClick={startRecording}
                        className="flex items-center gap-2 bg-rose-600 hover:bg-rose-500 text-white font-semibold px-6 py-3.5 rounded-2xl transition shadow-lg shadow-rose-600/20 active:scale-95"
                      >
                        <Mic size={18} />
                        <span>Empezar a Grabar</span>
                      </button>
                    ) : (
                      <div className="relative flex items-center">
                        <span className="absolute -left-2 h-14 w-40 rounded-2xl bg-rose-500/20 record-pulse z-0" />
                        <button
                          onClick={stopRecording}
                          className="relative z-10 flex items-center gap-2.5 bg-slate-100 hover:bg-white text-slate-950 font-bold px-6 py-3.5 rounded-2xl transition shadow-lg"
                        >
                          <Square size={16} className="fill-slate-950" />
                          <span className="text-rose-600">{formatTime(recordingSeconds)}</span>
                          <span className="text-slate-800 font-medium border-l border-slate-300 pl-2">Detener</span>
                        </button>
                      </div>
                    )}
                  </div>

                  {/* Play Recorded Audio (Student Playback) */}
                  {audioUrl && (
                    <div className="flex items-center gap-2">
                      <audio src={audioUrl} controls className="h-10 max-w-[180px] bg-slate-900 rounded-lg" />
                    </div>
                  )}
                </div>

                {/* Hidden actual players for triggers */}
                {ttsAudioUrl && (
                  <audio ref={ttsAudioElementRef} src={ttsAudioUrl} className="hidden" />
                )}

                {/* Submit Pronunciation Analysis */}
                {audioBlob && !isRecording && (
                  <div className="mt-2 flex justify-center">
                    <button
                      onClick={evaluatePronunciation}
                      disabled={isLoadingFeedback}
                      className="flex items-center gap-2.5 bg-gradient-to-r from-indigo-500 to-violet-600 hover:from-indigo-600 hover:to-violet-700 text-white font-bold py-3 px-8 rounded-2xl transition shadow-xl shadow-indigo-600/10 active:scale-98 disabled:opacity-50"
                    >
                      {isLoadingFeedback ? (
                        <>
                          <Loader2 size={18} className="animate-spin" />
                          <span>El Profesor está analizando tu voz...</span>
                        </>
                      ) : (
                        <>
                          <Sparkles size={18} />
                          <span>Solicitar Corrección al Profesor</span>
                        </>
                      )}
                    </button>
                  </div>
                )}

              </div>

              {}
              {/* Feedback Section */}
              {(isLoadingFeedback || feedback) && (
                <div className="bg-slate-950 p-6 md:p-8 rounded-3xl border border-slate-800">
                  <div className="flex items-center justify-between border-b border-slate-800/80 pb-4 mb-4">
                    <div className="flex items-center gap-2.5 text-indigo-400">
                      <MessageSquare size={20} />
                      <h3 className="font-bold text-lg">👨‍🏫 Informe del Profesor</h3>
                    </div>
                    {isLoadingFeedback && (
                      <span className="text-xs text-slate-400 animate-pulse flex items-center gap-1">
                        <Loader2 size={12} className="text-indigo-400" />
                        Escuchando pronunciación...
                      </span>
                    )}
                  </div>

                  {isLoadingFeedback ? (
                    <div className="py-8 flex flex-col items-center justify-center gap-3">
                      <div className="relative flex items-center justify-center">
                        <div className="animate-ping absolute inline-flex h-12 w-12 rounded-full bg-indigo-500/10"></div>
                        <Loader2 size={32} className="text-indigo-500 relative" />
                      </div>
                      <p className="text-sm text-slate-400 text-center max-w-sm mt-2">
                        Comparando la onda fonética de tu grabación con el texto esperado para brindarte el mejor consejo...
                      </p>
                    </div>
                  ) : (
                    <div className="prose prose-invert max-w-none text-slate-300 leading-relaxed text-sm space-y-4">
                      {feedback.split('\n').map((line, i) => {
                        if (line.startsWith('###')) {
                          return <h4 key={i} className="text-indigo-300 font-bold text-base mt-5 mb-2 first:mt-0">{line.replace('###', '').trim()}</h4>;
                        } else if (line.startsWith('- **') || line.startsWith('* **')) {
                          return (
                            <p key={i} className="ml-2 py-0.5">
                              {line.split('**').map((part, index) => 
                                index % 2 === 1 ? <strong key={index} className="text-white font-semibold">{part}</strong> : part
                              )}
                            </p>
                          );
                        } else if (line.startsWith('-') || line.startsWith('*')) {
                          return <li key={i} className="ml-4 list-disc marker:text-indigo-400 py-0.5">{line.substring(1).trim()}</li>;
                        } else if (line.trim() === '') {
                          return <div key={i} className="h-2" />;
                        }
                        return <p key={i}>{line}</p>;
                      })}
                    </div>
                  )}
                </div>
              )}

            </div>

          </main>

          {/* Footer Instructions / Tips */}
          <footer className="mt-auto border-t border-slate-800 bg-slate-950 py-6 px-6">
            <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4 text-xs text-slate-500">
              <p>© 2026 Tutor Multimodal Gemini. Diseñado para optimizar la dicción y fluidez lingüística.</p>
              <div className="flex gap-4">
                <span>Consejo: Intenta leer en un entorno silencioso para mejorar la precisión del análisis de voz.</span>
              </div>
            </div>
          </footer>

        </div>
      );
    }

    // Montando la aplicación en el DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
